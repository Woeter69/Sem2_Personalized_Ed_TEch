services:
  - type: web
    name: edufuture
    runtime: docker
    plan: free
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: YOUTUBE_API_KEY
        sync: false
      - key: DATABASE_URL
        value: sqlite:///edufuture.db
    mounts:
      - type: disk
        name: db-data
        mountPath: /app/data
        sizeGB: 1
